version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/postgres?sslmode=disable
      APP_PORT: 8080
    depends_on:
      - db
    ports:
      - 8080:8080

volumes:
  db-data:
